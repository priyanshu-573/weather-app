<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <form onsubmit="event.preventDefault(); searchWeather();" class="search">
            <input type="text" id="cityInput" placeholder="Enter city name" spellcheck="false">
            <button type="submit">Search</button>
        </form>

        <div class="weather" style="display: none;">
            <img src="" class="weather-icon" alt="Weather Icon">
            <h1 class="temp"></h1>
            <h2 class="city"></h2>

            <div class="details">
                <div class="col">
                    <img src="images/humidity.png" alt="Humidity Icon">
                    <div>
                        <p class="humidity"></p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <img src="images/wind.png" alt="Wind Icon">
                    <div>
                        <p class="wind"></p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>

            <div class="hourly-forecast"></div>
        </div>
        <div class="map-container">
    <iframe id="mapFrame" src="" width="100%" height="200" style="border:0; border-radius: 15px; margin-top: 20px;" allowfullscreen="" loading="lazy"></iframe>
</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
